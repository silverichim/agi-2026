<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AGI-Guided Differentiation · Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;450;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --base:#F5F7F7; --panel:#FFFFFF; --panel-2:#FBFCFC;
  --ink:#161C1F; --ink-2:#3A454B; --muted:#6A757C; --faint:#9AA4AA;
  --line:#E4E9EA; --line-2:#EFF2F2;
  --petrol:#0B6E63; --petrol-d:#075049; --petrol-wash:#E5F1EF;
  --indigo:#3E3CB8; --indigo-wash:#ECEBFA;
  --pass:#1B7A4B; --pass-wash:#E4F2EA;
  --warn:#B0730F; --warn-wash:#FBF0DC;
  --fail:#B4323F; --fail-wash:#FBE7E8;
  --up:#B4323F; --down:#1B5FA8;
  --shadow:0 1px 2px rgba(16,28,31,.05), 0 6px 24px rgba(16,28,31,.05);
  --r:10px; --r-sm:7px;
  --f-disp:'Space Grotesk',system-ui,sans-serif;
  --f-body:'Inter',system-ui,sans-serif;
  --f-mono:'IBM Plex Mono',ui-monospace,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:linear-gradient(to right, var(--base) calc(100% - 100px), var(--panel-2) 100%); color:var(--ink); font-family:var(--f-body);
  font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer}
h1,h2,h3,h4{margin:0;font-family:var(--f-disp);font-weight:600;letter-spacing:-.01em}
.mono{font-family:var(--f-mono)}
a{color:var(--petrol)}

/* ---------- Topbar ---------- */
.topbar{
  height:56px; background:var(--panel); border-bottom:1px solid var(--line);
  display:flex; align-items:center; gap:18px; padding:0 20px; position:sticky; top:0; z-index:40;
}
.brand{display:flex;align-items:center;gap:11px}
.brand .glyph{
  width:26px;height:26px;border-radius:7px;
  background:
    radial-gradient(circle at 30% 30%, #14847a 0 22%, transparent 23%),
    radial-gradient(circle at 70% 62%, #3e3cb8 0 18%, transparent 19%),
    linear-gradient(135deg,var(--petrol-d),var(--petrol));
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.15);
}
.brand .t{font-family:var(--f-disp);font-weight:600;font-size:14.5px;letter-spacing:-.01em}
.brand .t small{display:block;font-family:var(--f-mono);font-weight:400;font-size:10px;color:var(--faint);letter-spacing:.04em;text-transform:uppercase}
.topbar .spacer{flex:1}
.run-pill{
  display:flex;align-items:center;gap:9px;background:var(--panel-2);
  border:1px solid var(--line);border-radius:99px;padding:5px 6px 5px 13px;
}
.run-pill .lbl{font-size:11px;color:var(--muted)}
.run-pill .val{font-family:var(--f-mono);font-size:12px;font-weight:500}
.run-pill select{
  border:1px solid var(--line);background:var(--panel);border-radius:99px;
  font-family:var(--f-mono);font-size:11.5px;padding:4px 8px;color:var(--ink);
}
.badge-model{
  font-family:var(--f-mono);font-size:11px;color:var(--petrol-d);
  background:var(--petrol-wash);border:1px solid #cfe6e2;border-radius:6px;padding:4px 8px;font-weight:500;
}
.icon-btn{
  border:1px solid var(--line);background:var(--panel);border-radius:8px;height:34px;padding:0 12px;
  font-size:12.5px;color:var(--ink-2);display:inline-flex;align-items:center;gap:7px;
}
.icon-btn:hover{border-color:#cdd5d6;background:var(--panel-2)}

/* ---------- Layout ---------- */
.layout{display:grid;grid-template-columns:236px 1fr;min-height:calc(100vh - 56px)}

/* ---------- Spine ---------- */
.spine{
  border-right:1px solid var(--line);background:var(--panel);padding:16px 0 40px;position:sticky;top:56px;
  height:calc(100vh - 56px);overflow-y:auto;
}
.spine-eyebrow{
  font-family:var(--f-mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;
  color:var(--faint);padding:6px 20px 8px;
}
.stage{
  --dot:var(--faint);
  display:grid;grid-template-columns:34px 1fr;align-items:center;gap:2px;
  padding:8px 18px;position:relative;border:none;background:none;width:100%;text-align:left;
}
.stage .rail{position:relative;height:34px;display:flex;align-items:center;justify-content:center}
.stage .rail::before{ /* connector */
  content:"";position:absolute;left:50%;top:-8px;bottom:-8px;width:2px;transform:translateX(-50%);
  background:var(--line-2);
}
.stage:first-of-type .rail::before{top:17px}
.stage.is-last .rail::before{bottom:17px}
.stage .dot{
  width:13px;height:13px;border-radius:50%;background:var(--panel);
  border:2px solid var(--dot);position:relative;z-index:2;transition:.2s;
}
.stage .meta{display:flex;flex-direction:column;line-height:1.25}
.stage .no{font-family:var(--f-mono);font-size:10px;color:var(--faint);letter-spacing:.03em}
.stage .nm{font-size:13px;font-weight:500;color:var(--ink-2)}
.stage[data-status="done"]{--dot:var(--pass)}
.stage[data-status="done"] .dot{background:var(--pass)}
.stage[data-status="active"]{--dot:var(--petrol)}
.stage[data-status="active"] .dot{background:var(--petrol);box-shadow:0 0 0 4px var(--petrol-wash)}
.stage[data-status="warn"]{--dot:var(--warn)}
.stage[data-status="warn"] .dot{background:var(--warn)}
.stage.sel{background:linear-gradient(90deg,var(--petrol-wash),transparent 90%)}
.stage.sel .nm{color:var(--ink);font-weight:600}
.stage:hover:not(.sel){background:var(--panel-2)}
.stage:focus-visible{outline:2px solid var(--petrol);outline-offset:-2px}
.spine-div{height:1px;background:var(--line);margin:12px 18px}

/* ---------- Main ---------- */
.main{padding:26px max(30px, calc((100% - 1200px) / 2)) 80px}
.stage-head{display:flex;align-items:flex-start;gap:16px;margin-bottom:20px}
.stage-head .ix{
  font-family:var(--f-mono);font-size:12px;color:var(--petrol-d);background:var(--petrol-wash);
  border-radius:8px;padding:7px 10px;font-weight:600;white-space:nowrap;
}
.stage-head h2{font-size:22px}
.stage-head .sub{color:var(--muted);font-size:13.5px;margin-top:3px;max-width:62ch}
.stage-head .agent-state{margin-left:auto;display:flex;align-items:center;gap:8px;white-space:nowrap}
.agent-chip{
  font-family:var(--f-mono);font-size:11px;padding:5px 10px;border-radius:99px;font-weight:500;
  display:inline-flex;align-items:center;gap:7px;border:1px solid var(--line);color:var(--muted);background:var(--panel);
}
.agent-chip .led{width:7px;height:7px;border-radius:50%;background:var(--faint)}
.agent-chip.running{color:var(--indigo);background:var(--indigo-wash);border-color:#d6d4f2}
.agent-chip.running .led{background:var(--indigo);animation:pulse 1s infinite}
.agent-chip.waiting{color:var(--warn);background:var(--warn-wash);border-color:#eddcb8}
.agent-chip.waiting .led{background:var(--warn)}
.agent-chip.done{color:var(--pass);background:var(--pass-wash);border-color:#c9e6d5}
.agent-chip.done .led{background:var(--pass)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* panels */
.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:18px;overflow:hidden}
.panel-h{
  display:flex;align-items:center;gap:10px;padding:13px 18px;border-bottom:1px solid var(--line-2);
}
.panel-h .kind{
  font-family:var(--f-mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;
  padding:3px 8px;border-radius:5px;font-weight:600;
}
.kind.output{color:var(--petrol-d);background:var(--petrol-wash)}
.kind.control{color:var(--indigo);background:var(--indigo-wash)}
.panel-h h3{font-size:14.5px;font-weight:600}
.panel-h .meta{margin-left:auto;font-family:var(--f-mono);font-size:11px;color:var(--faint)}
.panel-b{padding:18px}
.panel-b.tight{padding:6px 6px 10px}

/* generic bits */
.row{display:flex;gap:14px;flex-wrap:wrap}
.field{display:flex;flex-direction:column;gap:6px;flex:1;min-width:160px}
.field label{font-size:11.5px;font-weight:500;color:var(--muted);font-family:var(--f-mono);letter-spacing:.02em}
.input,textarea.input,select.input{
  border:1px solid var(--line);border-radius:var(--r-sm);padding:9px 11px;font-size:13.5px;font-family:var(--f-body);
  color:var(--ink);background:var(--panel);width:100%;
}
textarea.input{resize:vertical;line-height:1.55}
.input:focus{outline:2px solid var(--petrol);outline-offset:-1px;border-color:var(--petrol)}
.hint{font-size:12px;color:var(--muted);margin-top:2px}
.btn{
  border:1px solid var(--petrol);background:var(--petrol);color:#fff;border-radius:var(--r-sm);
  padding:10px 18px;font-weight:600;font-size:13.5px;display:inline-flex;align-items:center;gap:9px;
}
.btn:hover{background:var(--petrol-d);border-color:var(--petrol-d)}
.btn.ghost{background:var(--panel);color:var(--ink-2);border-color:var(--line)}
.btn.ghost:hover{background:var(--panel-2);border-color:#cdd5d6}
.btn.sm{padding:6px 12px;font-size:12.5px}
.btn[disabled]{opacity:.45;pointer-events:none}
.actions{display:flex;gap:10px;align-items:center;margin-top:4px}
.actions .grow{flex:1}

/* chips */
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{
  display:inline-flex;align-items:center;gap:8px;border:1px solid var(--line);background:var(--panel-2);
  border-radius:99px;padding:6px 10px 6px 12px;font-family:var(--f-mono);font-size:12.5px;font-weight:500;
}
.chip .seed{font-size:9px;color:var(--petrol-d);background:var(--petrol-wash);padding:2px 5px;border-radius:4px;letter-spacing:.03em}
.chip .x{border:none;background:none;color:var(--faint);font-size:15px;line-height:1;padding:0 2px}
.chip .x:hover{color:var(--fail)}
.chip.off{opacity:.5;text-decoration:line-through}
.chip.skip{border-color:#eddcb8;background:var(--warn-wash)}
.chip.skip .tag{font-size:9px;color:var(--warn);background:#fff;border:1px solid #eddcb8;padding:2px 5px;border-radius:4px}

/* tables */
table{width:100%;border-collapse:collapse;font-size:13px}
th{
  text-align:left;font-family:var(--f-mono);font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;
  color:var(--muted);font-weight:600;padding:9px 12px;border-bottom:1px solid var(--line);white-space:nowrap;
}
td{padding:9px 12px;border-bottom:1px solid var(--line-2);vertical-align:middle}
tr:last-child td{border-bottom:none}
tbody tr:hover{background:var(--panel-2)}
td.num,th.num{text-align:right;font-family:var(--f-mono);font-size:12.5px}
.gene{font-family:var(--f-mono);font-weight:600;font-size:12.5px}
.pos{color:var(--up)} .neg{color:var(--down)}
.sig{color:var(--petrol-d);font-weight:600}

/* status pills */
.pill{font-family:var(--f-mono);font-size:11px;font-weight:600;padding:3px 9px;border-radius:99px;display:inline-flex;align-items:center;gap:6px}
.pill.pass{color:var(--pass);background:var(--pass-wash)}
.pill.warn{color:var(--warn);background:var(--warn-wash)}
.pill.fail{color:var(--fail);background:var(--fail-wash)}
.pill.up{color:var(--up);background:var(--fail-wash)}
.pill.down{color:var(--down);background:#E7F0FA}
.dir{font-family:var(--f-mono);font-size:11px;font-weight:600}

/* selectable list (datasets) */
.optlist{display:flex;flex-direction:column;gap:0}
.opt{display:flex;gap:13px;padding:14px 16px;border-bottom:1px solid var(--line-2);cursor:pointer;align-items:flex-start}
.opt:last-child{border-bottom:none}
.opt:hover{background:var(--panel-2)}
.opt.sel{background:var(--petrol-wash)}
.opt .rd{width:17px;height:17px;border-radius:50%;border:2px solid var(--faint);margin-top:2px;flex:none;position:relative}
.opt.sel .rd{border-color:var(--petrol)}
.opt.sel .rd::after{content:"";position:absolute;inset:3px;border-radius:50%;background:var(--petrol)}
.opt .body{flex:1}
.opt .name{font-family:var(--f-mono);font-weight:600;font-size:13px}
.opt .desc{color:var(--muted);font-size:12.5px;margin-top:2px}
.opt .facets{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.facet{font-family:var(--f-mono);font-size:10.5px;color:var(--ink-2);background:var(--panel-2);border:1px solid var(--line);padding:2px 7px;border-radius:5px}
.facet.ok{color:var(--pass);background:var(--pass-wash);border-color:#c9e6d5}

/* callouts */
.note{display:flex;gap:11px;padding:12px 14px;border-radius:var(--r-sm);font-size:13px;line-height:1.5;border:1px solid}
.note .ic{font-family:var(--f-mono);font-weight:700;flex:none}
.note.info{background:var(--indigo-wash);border-color:#d6d4f2;color:#2c2a86}
.note.warn{background:var(--warn-wash);border-color:#eddcb8;color:#7a4f08}
.note.ok{background:var(--pass-wash);border-color:#c9e6d5;color:#0f5a37}

/* coverage bar */
.cov{display:flex;align-items:center;gap:12px;margin-top:6px}
.cov .track{flex:1;height:8px;border-radius:99px;background:var(--line);overflow:hidden}
.cov .fill{height:100%;background:var(--petrol);border-radius:99px}
.cov .lab{font-family:var(--f-mono);font-size:12px;color:var(--ink-2);white-space:nowrap}

/* UMAP */
.umap-wrap{display:grid;grid-template-columns:1.1fr .9fr;gap:16px}
@media(max-width:760px){.umap-wrap{grid-template-columns:1fr}}
.umap{background:var(--panel-2);border:1px solid var(--line-2);border-radius:var(--r-sm);position:relative;overflow:hidden;cursor:grab;touch-action:none}
.umap.grabbing{cursor:grabbing}
.umap svg{display:block}
.umap-ctrl{position:absolute;top:8px;right:8px;display:flex;flex-direction:column;gap:5px;z-index:2}
.umap-ctrl button{width:28px;height:28px;border:1px solid var(--line);background:var(--panel);border-radius:6px;font-size:15px;line-height:1;color:var(--ink-2);display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow)}
.umap-ctrl button:hover{background:var(--panel-2);border-color:#cdd5d6}
.umap-hint{position:absolute;left:9px;bottom:8px;font-family:var(--f-mono);font-size:10px;color:var(--faint);pointer-events:none;background:rgba(251,252,252,.7);padding:1px 5px;border-radius:4px}
.legend{display:flex;flex-wrap:wrap;gap:6px 14px;margin-top:10px;font-size:12px}
.legend span{display:inline-flex;align-items:center;gap:6px;font-family:var(--f-mono);font-size:11.5px;color:var(--ink-2)}
.legend i{width:9px;height:9px;border-radius:2px;display:inline-block}

/* resource estimator */
.est{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
@media(max-width:640px){.est{grid-template-columns:1fr}}
.stat{border:1px solid var(--line);border-radius:var(--r-sm);padding:13px 14px;background:var(--panel-2)}
.stat .k{font-family:var(--f-mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted)}
.stat .v{font-family:var(--f-mono);font-size:20px;font-weight:600;margin-top:5px}
.stat .v small{font-size:12px;color:var(--muted);font-weight:400}

/* matrix */
.matrix-scroll{overflow-x:auto}
.matrix{border-collapse:separate;border-spacing:5px;min-width:520px}
.matrix th{text-transform:none;letter-spacing:0;font-size:11px;padding:4px 6px}
.matrix td.ctlab{font-family:var(--f-mono);font-size:11.5px;color:var(--ink-2);white-space:nowrap;padding-right:10px;border:none}
.cell{
  width:74px;height:30px;border-radius:6px;border:1px solid var(--line);background:var(--panel-2);
  font-family:var(--f-mono);font-size:10px;color:var(--faint);display:flex;align-items:center;justify-content:center;
  transition:.3s;
}
.cell.queued{background:#F0F2F3;color:var(--muted)}
.cell.running{background:var(--indigo-wash);color:var(--indigo);border-color:#d6d4f2}
.cell.running::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--indigo);margin-right:5px;animation:pulse 1s infinite}
.cell.done{background:var(--pass-wash);color:var(--pass);border-color:#c9e6d5}
.cell.failed{background:var(--fail-wash);color:var(--fail);border-color:#f0cdd0}

/* sanity */
.check{display:grid;grid-template-columns:26px 1fr auto;gap:12px;padding:15px 4px;border-bottom:1px solid var(--line-2);align-items:start}
.check:last-child{border-bottom:none}
.check .cno{font-family:var(--f-mono);font-size:11px;color:var(--faint);margin-top:2px}
.check .nm{font-weight:600;font-size:13.5px}
.check .dt{color:var(--muted);font-size:12.5px;margin-top:3px;line-height:1.5}
.tier-hero{display:flex;align-items:center;gap:18px;padding:18px;border-radius:var(--r-sm);border:1px solid}
.tier-hero.warn{background:var(--warn-wash);border-color:#eddcb8}
.tier-hero .big{font-family:var(--f-disp);font-size:30px;font-weight:700}
.tier-hero.warn .big{color:var(--warn)}
.tier-hero .txt{font-size:13px;color:#7a4f08;line-height:1.5}

/* tabs */
.tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:18px;flex-wrap:wrap}
.tab{
  border:none;background:none;padding:9px 13px;font-size:13px;font-weight:500;color:var(--muted);
  border-bottom:2px solid transparent;margin-bottom:-1px;
}
.tab:hover{color:var(--ink-2)}
.tab.sel{color:var(--petrol-d);border-bottom-color:var(--petrol);font-weight:600}
.tabpane{display:none}
.tabpane.sel{display:block}

/* evidence convergence */
.conv{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
@media(max-width:720px){.conv{grid-template-columns:repeat(3,1fr)}}
.conv .c{border:1px solid var(--line);border-radius:var(--r-sm);padding:12px;text-align:center;background:var(--panel-2)}
.conv .c .dim{font-family:var(--f-mono);font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.conv .c .sig{font-family:var(--f-disp);font-size:22px;font-weight:700;color:var(--pass);margin-top:6px}
.conv .c .d{font-size:11px;color:var(--muted);margin-top:4px}

/* ranked outcomes */
.rank{display:flex;flex-direction:column;gap:8px}
.rk{display:grid;grid-template-columns:26px 90px 1fr 66px;gap:12px;align-items:center;padding:9px 12px;border:1px solid var(--line-2);border-radius:var(--r-sm);background:var(--panel-2)}
.rk .pos{font-family:var(--f-disp);font-weight:700;color:var(--faint)}
.rk.top{border-color:#c9e6d5;background:var(--pass-wash)}
.rk.top .pos{color:var(--pass)}
.rk .g{font-family:var(--f-mono);font-weight:600}
.rk .bar{height:8px;border-radius:99px;background:var(--line);overflow:hidden}
.rk .bar i{display:block;height:100%;background:linear-gradient(90deg,var(--petrol),#12988a)}
.rk .nes{font-family:var(--f-mono);font-weight:600;text-align:right}

/* history */
.tree{display:flex;flex-direction:column;gap:0}
.node{display:grid;grid-template-columns:30px 1fr;gap:6px}
.node .line{display:flex;justify-content:center;position:relative}
.node .line::before{content:"";width:2px;background:var(--line);position:absolute;top:0;bottom:0}
.node:first-child .line::before{top:16px}
.node.last .line::before{bottom:calc(100% - 16px)}
.node .knot{width:11px;height:11px;border-radius:50%;background:var(--panel);border:2px solid var(--petrol);margin-top:11px;z-index:2}
.node.child .knot{margin-left:18px;border-color:var(--indigo)}
.node .card{border:1px solid var(--line);border-radius:var(--r-sm);padding:12px 14px;margin:6px 0;background:var(--panel);cursor:pointer}
.node.child .card{margin-left:18px}
.node .card:hover{border-color:var(--petrol);background:var(--panel-2)}
.node .card.sel{border-color:var(--petrol);box-shadow:0 0 0 3px var(--petrol-wash)}
.node .card .top{display:flex;align-items:center;gap:10px}
.node .card .rn{font-family:var(--f-mono);font-weight:600;font-size:13px}
.node .card .when{margin-left:auto;font-family:var(--f-mono);font-size:11px;color:var(--faint)}
.node .card .diff{font-size:12px;color:var(--muted);margin-top:5px}
.node .card .diff b{color:var(--ink-2);font-weight:600}

.diffcols{display:grid;grid-template-columns:1fr 1fr;gap:0;border:1px solid var(--line);border-radius:var(--r-sm);overflow:hidden}
.diffcols .col{padding:0}
.diffcols .col:first-child{border-right:1px solid var(--line)}
.diffcols .colh{font-family:var(--f-mono);font-size:11px;padding:9px 13px;background:var(--panel-2);border-bottom:1px solid var(--line);font-weight:600}
.diffrow{display:flex;justify-content:space-between;gap:10px;padding:8px 13px;border-bottom:1px solid var(--line-2);font-size:12.5px}
.diffrow .k{color:var(--muted);font-family:var(--f-mono);font-size:11px}
.diffrow .v{font-family:var(--f-mono);font-weight:500}
.diffrow.chg{background:var(--warn-wash)}
.stage-reuse{display:flex;gap:7px;flex-wrap:wrap;margin-top:12px}
.sr{font-family:var(--f-mono);font-size:11px;padding:4px 9px;border-radius:6px;border:1px solid var(--line)}
.sr.reused{color:var(--pass);background:var(--pass-wash);border-color:#c9e6d5}
.sr.fresh{color:var(--indigo);background:var(--indigo-wash);border-color:#d6d4f2}

/* phase 2 tracks */
.tracks{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
@media(max-width:820px){.tracks{grid-template-columns:1fr}}
.track{border:1px solid var(--line);border-radius:var(--r);padding:16px;background:var(--panel)}
.track .tag{font-family:var(--f-mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;padding:3px 8px;border-radius:5px;font-weight:600;display:inline-block}
.track.p1 .tag{color:var(--pass);background:var(--pass-wash)}
.track.p2 .tag{color:var(--down);background:#E7F0FA}
.track.p3 .tag{color:var(--indigo);background:var(--indigo-wash)}
.track h4{font-size:15px;margin:10px 0 4px}
.track .n{font-family:var(--f-disp);font-size:30px;font-weight:700;margin:8px 0 2px}
.track .desc{font-size:12.5px;color:var(--muted);line-height:1.5}
.pool{display:flex;align-items:center;gap:14px;margin-top:16px;padding:16px;border:1px dashed var(--petrol);border-radius:var(--r);background:var(--petrol-wash)}
.pool .big{font-family:var(--f-disp);font-size:26px;font-weight:700;color:var(--petrol-d)}

/* drawer */
.drawer-bd{position:fixed;inset:0;background:rgba(16,28,31,.28);opacity:0;pointer-events:none;transition:.2s;z-index:50}
.drawer-bd.open{opacity:1;pointer-events:auto}
.drawer{
  position:fixed;top:0;right:0;height:100vh;width:min(430px,92vw);background:var(--panel);z-index:51;
  transform:translateX(100%);transition:.26s cubic-bezier(.4,0,.2,1);box-shadow:-8px 0 40px rgba(16,28,31,.14);
  display:flex;flex-direction:column;
}
.drawer.open{transform:translateX(0)}
.drawer-h{display:flex;align-items:center;gap:10px;padding:16px 18px;border-bottom:1px solid var(--line)}
.drawer-h h3{font-size:15px}
.drawer-h .x{margin-left:auto;border:none;background:none;font-size:20px;color:var(--muted)}
.prov{overflow-y:auto;padding:8px 0}
.pv{display:grid;grid-template-columns:66px 1fr;gap:10px;padding:11px 18px;border-bottom:1px solid var(--line-2);font-size:12.5px}
.pv .tm{font-family:var(--f-mono);font-size:11px;color:var(--faint)}
.pv .ev b{font-family:var(--f-mono);font-weight:600;font-size:12px}
.pv .ev span{color:var(--muted)}

.foot-hint{font-size:12px;color:var(--faint);text-align:center;padding:22px;font-family:var(--f-mono)}

/* mobile spine */
.spine-toggle{display:none}
@media(max-width:820px){
  .layout{grid-template-columns:1fr}
  .spine{position:fixed;left:0;top:56px;z-index:35;width:236px;transform:translateX(-100%);transition:.22s;box-shadow:var(--shadow)}
  .spine.open{transform:translateX(0)}
  .spine-toggle{display:inline-flex}
  .main{padding:20px 16px 70px}
}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
</style>

const state = {

const $ = s=>document.querySelector(s);
const el = (h)=>{const d=document.createElement('div');d.innerHTML=h.trim();return d.firstChild;};

/* ============================ SPINE ============================ */
function renderSpine(){
  const nav = $('#spine'); nav.innerHTML='';
  nav.appendChild(el(`<div class="spine-eyebrow">Pipeline</div>`));
  let downStarted=false;
  STAGES.forEach((s,i)=>{
    if(s.group==='downstream' && !downStarted){ downStarted=true; nav.appendChild(el(`<div class="spine-div"></div>`)); nav.appendChild(el(`<div class="spine-eyebrow">Downstream</div>`)); }
    const st = state.status[s.id]||'pending';
    const isLast = (i===STAGES.length-1);
    const b = el(`<button class="stage ${s.id===state.current?'sel':''} ${isLast?'is-last':''}" data-status="${st}" data-id="${s.id}">
      <span class="rail"><span class="dot"></span></span>
      <span class="meta"><span class="no">${s.no}</span><span class="nm">${s.nm}</span></span>
    </button>`);
    b.addEventListener('click',()=>go(s.id));
    nav.appendChild(b);
  });
}
function go(id){
  state.current=id;
  if(state.status[id]==='pending' && id!=='sanity') state.status[id]='active';
  renderSpine(); renderMain();
  if(window.innerWidth<=820) $('#spine').classList.remove('open');
  $('#main').scrollTo?.(0,0); window.scrollTo(0,0);
}
function complete(id,next){
  state.status[id]= (id==='run'||id==='report')&&SANITY.some(c=>c.tier==='warn') ? 'warn':'done';
  if(next){ if(state.status[next]==='pending') state.status[next]='active'; go(next); }
  else{ renderSpine(); }
}

/* ============================ VIEW HELPERS ============================ */
function head(ix,title,sub,agentState){
  const map={running:['running','running'],waiting:['waiting','waiting for you'],done:['done','done'],idle:['','idle']};
  const a=map[agentState]||map.idle;
  return `<div class="stage-head">
    <span class="ix">${ix}</span>
    <div><h2>${title}</h2><div class="sub">${sub}</div></div>
    <div class="agent-state"><span class="agent-chip ${a[0]}"><span class="led"></span>${a[1]}</span></div>
  </div>`;
}
function panel(kind,label,title,meta,body){
  return `<div class="panel">
    <div class="panel-h"><span class="kind ${kind}">${label}</span><h3>${title}</h3>${meta?`<span class="meta">${meta}</span>`:''}</div>
    <div class="panel-b">${body}</div></div>`;
}

tfmap(){
  const rows = activeTFs().filter(t=>t.inModel);
  const isOn = t=>t.regOn!==false;
  const active = rows.filter(isOn);
  const excluded = rows.filter(t=>!isOn(t));
  const totalTargets = active.reduce((s,t)=>s+regCount(t),0);
  const pct = rows.length?Math.round(active.length/rows.length*100):0;
  const lowActive = active.filter(t=>regTier(t)==='C').map(t=>t.name);
  return head('03','TF regulons','For each confirmed TF, its downstream target genes (ChEA3 / DoRothEA). Exclude low-confidence regulons if they would dominate scoring.','waiting')
  + panel('output','output','TF → target genes','ChEA3 / DoRothEA',`
    <table><thead><tr><th>TF</th><th>tier</th><th>targets</th><th class="num">#</th><th></th></tr></thead><tbody>

        <td><span class="pill ${tier==='C'?'warn':'pass'}" style="${mute}">${tier}</span></td>

    ${lowActive.length?`<div class="note warn" style="margin-top:12px"><span class="ic">!</span><div>Low-confidence (tier C) regulon still active: <b>${lowActive.join(', ')}</b>. A large, weakly-supported regulon can dominate scoring — exclude it if it drowns out higher-confidence TFs.</div></div>`:''}`)
  + `<div class="actions"><button class="btn" data-next="data">Continue →</button></div>`;
},

/* ---------- sub-renderers ---------- */
function activeTFs(){ return TFS.filter(t=>t.on); }
/* regulon confidence tier + target-gene count (mock, mirrors the ChEA3/DoRothEA table) */
function regTier(t){ return t.name==='ISX' ? 'C' : 'A'; }
function regCount(t){ return t.name==='CDX2'?312:t.name==='GATA4'?188:t.name==='HNF4A'?142:24; }
/* mock model vocabulary check: most protein-coding symbols are in the 18,080-gene set;
   a short blocklist + non-coding-looking IDs are treated as out-of-vocab for the demo. */
const OUT_OF_VOCAB = new Set(['VIL1','MALAT1','NEAT1']);
function isInVocab(name){ return !OUT_OF_VOCAB.has(name) && !/^(LINC|MIR|LOC|SNOR|AC\d|AL\d|RP\d|CTD-)/i.test(name); }
function extractSymbols(arr){
  const skip = new Set(['GENE','GENES','SYMBOL','SYMBOLS','TF','TFS','NAME','ID','GENEID','GENE_SYMBOL']);
  const out = [];
  arr.forEach(v=>{
    if(v===null||v===undefined) return;
    String(v).split(/[\s,;\t]+/).forEach(tok=>{
      const g = tok.trim().toUpperCase();
      if(!g) return;
      if(!/^[A-Z0-9][A-Z0-9\-]{1,14}$/.test(g)) return;   // symbol-like only
      if(skip.has(g)) return;                              // drop header words
      out.push(g);
    });
  });
  return [...new Set(out)];
}
function addTFs(names){
  let added = 0;
  names.forEach(g=>{
    if(TFS.some(t=>t.name.toUpperCase()===g)) return;      // dedupe against existing
    TFS.push({name:g, seed:false, on:true, added:true, manual:true,
              inModel:isInVocab(g), ev:'—', why:'user-added', targets:'—'});
    added++;
  });
  return added;
}
function loadXLSX(){
  return new Promise((res,rej)=>{
    if(window.XLSX) return res(window.XLSX);
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=()=>res(window.XLSX); s.onerror=rej; document.head.appendChild(s);
  });
}
function handleImport(file){
  const ext=(file.name.split('.').pop()||'').toLowerCase();
  const finish=(names)=>{ const n=addTFs(names);
    state.importMsg = n>0 ? `Imported ${n} gene${n>1?'s':''} from ${file.name}.` : `No new genes found in ${file.name}.`;
    renderMain(); };
  if(ext==='xlsx'||ext==='xls'){
    loadXLSX().then(XLSX=>{ const r=new FileReader();
      r.onload=e=>{ try{
        const wb=XLSX.read(new Uint8Array(e.target.result),{type:'array'});
        const ws=wb.Sheets[wb.SheetNames[0]];
        const rows=XLSX.utils.sheet_to_json(ws,{header:1});
        finish(extractSymbols(rows.flat()));
      }catch(err){ state.importMsg='Could not read that spreadsheet. Try a .csv instead.'; renderMain(); } };
      r.readAsArrayBuffer(file);
    }).catch(()=>{ state.importMsg='Excel reader is offline. Save the sheet as .csv and import that.'; renderMain(); });
  } else {
    const r=new FileReader();
    r.onload=e=>finish(extractSymbols(String(e.target.result).split(/\r?\n/)));
    r.readAsText(file);
  }
}

function diffRows(base,sel,side){
  const keys=Object.keys(base.params);
  return keys.map(k=>{
    const bv=base.params[k], sv=sel.params[k], chg=bv!==sv;
    const v= side==='l'?bv:sv;
    return `<div class="diffrow ${chg?'chg':''}"><span class="k">${k}</span><span class="v">${v}</span></div>`;
  }).join('');
}
function stageReuse(sel){
  const stages=['download','preprocess','perturbation','analysis'];
  const freshFrom = sel.id==='B'?['download','preprocess','perturbation','analysis'] : sel.id==='C'?['analysis'] : stages;
  return stages.map(s=>`<span class="sr ${freshFrom.includes(s)?'fresh':'reused'}">${s} · ${freshFrom.includes(s)?'fresh':'reused'}</span>`).join('');
}

/* ============================ RENDER + WIRING ============================ */
function renderMain(){
  const v = views[state.current]; if(!v) return;
  $('#main').innerHTML = v();
  wire();
}
function wire(){
  // generic "next" buttons
  document.querySelectorAll('[data-next]').forEach(b=>{
    b.addEventListener('click',()=>{ const cur=state.current; complete(cur,b.getAttribute('data-next')); });
  });
  // query start
  const sb=$('#startBtn'); if(sb) sb.addEventListener('click',()=>complete('query','scope'));
  // dataset select
  document.querySelectorAll('[data-ds]').forEach(o=>o.addEventListener('click',()=>{
    state.selDataset=o.getAttribute('data-ds'); renderMain();
  }));
  // TF toggles
  document.querySelectorAll('[data-tf]').forEach(btn=>btn.addEventListener('click',()=>{
    const nm=btn.getAttribute('data-tf'); const t=TFS.find(x=>x.name===nm)||(nm==='ISX'&&TFS.find(x=>x.name==='ISX'));
    if(t){ t.on=!t.on; renderMain(); }
  }));
  // regulon include/exclude (TF targets step)
  document.querySelectorAll('[data-reg]').forEach(btn=>btn.addEventListener('click',()=>{
    const t=TFS.find(x=>x.name===btn.getAttribute('data-reg'));
    if(t){ t.regOn = (t.regOn===false); renderMain(); }
  }));
  const tfBtn=$('#addTfBtn'), tfIn=$('#tfInput');
  const doAdd=()=>{ if(!tfIn) return; const names=extractSymbols([tfIn.value]);
    if(names.length){ const n=addTFs(names); state.importMsg = n>0?`Added ${names.slice(0,n).join(', ')}.`:'Those symbols are already in the list.'; renderMain(); } };
  if(tfBtn) tfBtn.addEventListener('click',doAdd);
  if(tfIn) tfIn.addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); doAdd(); } });
  const imp=$('#importInput'); if(imp) imp.addEventListener('change',e=>{ const f=e.target.files[0]; if(f) handleImport(f); });
  // submit matrix
  const sub=$('#submitBtn'); if(sub) sub.addEventListener('click',()=>{
    const cells=document.querySelectorAll('.matrix .cell[data-cell]');
    cells.forEach((c,i)=>{ setTimeout(()=>{ c.className='cell running'; c.textContent='running'; },200+i*260); });
    cells.forEach((c,i)=>{ setTimeout(()=>{ c.className='cell done'; c.textContent='done'; },1400+i*260); });
    setTimeout(()=>{ state.matrixRun=true; state.status.run='done'; renderMain(); }, 1400+cells.length*260+300);
  });
  // report tabs
  document.querySelectorAll('#repTabs .tab').forEach(t=>t.addEventListener('click',()=>{
    document.querySelectorAll('#repTabs .tab').forEach(x=>x.classList.remove('sel'));
    t.classList.add('sel');
    const id=t.getAttribute('data-tab');
    document.querySelectorAll('#repPanes .tabpane').forEach(p=>p.classList.toggle('sel',p.getAttribute('data-pane')===id));
  }));
  // gsea library
  const g=$('#gseaSel'); if(g) g.addEventListener('change',()=>{
    state.gseaLib=g.value;
    // re-render just the gsea pane
    const panes=$('#repPanes'); const scrollY=window.scrollY;
    panes.innerHTML=reportPanes();
    // keep gsea tab active
    document.querySelectorAll('#repPanes .tabpane').forEach(p=>p.classList.toggle('sel',p.getAttribute('data-pane')==='gsea'));
    document.querySelectorAll('#repTabs .tab').forEach(x=>x.classList.toggle('sel',x.getAttribute('data-tab')==='gsea'));
    wire(); window.scrollTo(0,scrollY);
  });
  // history select
  document.querySelectorAll('[data-run]').forEach(c=>c.addEventListener('click',()=>{
    state.selHistory=c.getAttribute('data-run'); renderMain();
  }));
  // umap zoom/pan
  if($('#umapSvg')) initUmap();
}

function initUmap(){
  const svg=$('#umapSvg'), g=$('#umapG'), box=$('#umapBox');
  const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
  const apply=()=>{ const t=state.umap; g.setAttribute('transform',`translate(${t.x} ${t.y}) scale(${t.k})`); };
  const toUser=(cx,cy)=>{ const ctm=svg.getScreenCTM().inverse(); const p=svg.createSVGPoint(); p.x=cx; p.y=cy; return p.matrixTransform(ctm); };
  const zoomAt=(px,py,factor)=>{ const t=state.umap; const nk=clamp(t.k*factor,0.6,12);
    t.x = px - nk*(px - t.x)/t.k; t.y = py - nk*(py - t.y)/t.k; t.k=nk; apply(); };
  apply();
  // wheel zoom toward cursor
  svg.addEventListener('wheel',e=>{ e.preventDefault(); const p=toUser(e.clientX,e.clientY);
    zoomAt(p.x,p.y, e.deltaY<0?1.15:1/1.15); },{passive:false});
  // drag to pan
  let dragging=false, start=null, tstart=null;
  svg.addEventListener('pointerdown',e=>{ dragging=true; box.classList.add('grabbing');
    start=toUser(e.clientX,e.clientY); tstart={x:state.umap.x,y:state.umap.y}; svg.setPointerCapture(e.pointerId); });
  svg.addEventListener('pointermove',e=>{ if(!dragging) return; const p=toUser(e.clientX,e.clientY);
    state.umap.x=tstart.x+(p.x-start.x); state.umap.y=tstart.y+(p.y-start.y); apply(); });
  const endDrag=()=>{ dragging=false; box.classList.remove('grabbing'); };
  svg.addEventListener('pointerup',endDrag); svg.addEventListener('pointercancel',endDrag);
  // buttons (zoom about center)
  box.querySelectorAll('[data-zoom]').forEach(b=>b.addEventListener('click',()=>{
    const z=b.getAttribute('data-zoom');
    if(z==='reset'){ state.umap={k:1,x:0,y:0}; apply(); }
    else zoomAt(210,140, z==='in'?1.35:1/1.35);
  }));
}

/* provenance drawer */
function renderProv(){ $('#prov').innerHTML = PROVLOG.map(p=>`<div class="pv"><div class="tm">${p[0]}</div><div class="ev">${p[1]}</div></div>`).join(''); }
$('#provBtn').addEventListener('click',()=>{ $('#drawer').classList.add('open'); $('#drawerBd').classList.add('open'); $('#drawer').setAttribute('aria-hidden','false'); });

$('#drawerX').addEventListener('click',closeDrawer); $('#drawerBd').addEventListener('click',closeDrawer);
$('#spineToggle').addEventListener('click',()=>$('#spine').classList.toggle('open'));

/* run switcher (demo: jumps to the relevant view) */
$('#runSel').addEventListener('click',e=>e.stopPropagation());
$('#runSel').addEventListener('change',e=>{
  state.selHistory=e.target.value; go('history');
});

/* init */
renderSpine(); renderMain(); renderProv();
